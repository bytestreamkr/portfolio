<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<script src="https://code.jquery.com/jquery-1.11.3.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://kit.fontawesome.com/68bb695166.js"></script> 
<script src="https://cdn.jsdelivr.net/npm/vue@2.7/dist/vue.js"></script>

</head>
<body>
<div class="container" id="loading_msg" style="font-weight:bold;">
	<div class="row">
		<div class="col text-center mt-5 font-italic">Now Loading.......</div>
	</div>
</div>

<div id="app" class="container" style="display:none;">
<div class="row mt-5 div-section align-items-end">
	<div class="col-5 col-md-2 font-italic">
		<h4 class="mb-0"><i class="fas fa-layer-group mr-2"></i> {{sections[0].title}}</h4>
	</div>
	<div class="col-7 col-md-10 font-italic section-detail">
		{{sections[0].detail}}
	</div>
	<div class="col col-md-12 py-3" ref-class="bg-light" v-html="about">
	</div>
</div>

<hr/>

<div class="row mt-5 div-section align-items-end">
	<div class="col-5 col-md-2 font-italic">
		<h4 class="mb-0"><i class="fas fa-layer-group mr-2"></i> {{sections[1].title}}</h4>
	</div>
	<div class="col-7 col-md-10 font-italic section-detail">
		{{sections[1].detail}}
	</div>
</div>



<site-list :sites="sites" @openurl="open_link"></site-list>

<hr/>


<div class="row mt-5 div-section align-items-end">
	<div class="col-5 col-md-2 font-italic">
		<h4 class="mb-0"><i class="fas fa-layer-group mr-2"></i> {{sections[2].title}}</h4>
	</div>
	<div class="col-7 col-md-10 font-italic section-detail">
		{{sections[2].detail}}
	</div>
</div>


<writings-component :writings="writings" @openurl="open_link"></writings-component>




</div>



<script>
function applyVue(){
	new Vue({
		el:"#app",
		data(){
			return {
				sections: [],
				about: "",
				sites: [] ,
				writings: [],
			}
		},
		created(){
			this.sections = sectionsData;
			this.about = aboutData;
			this.sites = portfolioData;
			this.writings = writingsData;
		},
		mounted(){
			document.getElementById("app").style.display="block";
			document.getElementById("loading_msg").style.display="none";
		},

		methods:{
			open_link(url){
				var winName = Array.from({ length: 10 }, () => String.fromCharCode(65 + Math.floor(Math.random() * 26))).join('');
				window.open(url, winName, "");
			},
			
		}
	});

	

}
</script>
<script>
const ver = Date.now();

function loadCSS(url) {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = `${url}?v=${ver}`;
    document.head.appendChild(link);
}

loadCSS("./portfolio.css");

function loadJS(url) {
    return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = `${url}?v=${ver}`;

        script.onload = resolve;
        script.onerror = reject;

        document.body.appendChild(script);
    });
}

async function init(callback) {
    try {

		await loadJS("./data/section-header.data.js");
		await loadJS("./data/about.data.js");
		await loadJS("./data/portfolio.data.js");
		await loadJS("./data/writings.data.js");

		await loadJS("./components/SiteItem.js");
		await loadJS("./components/SiteList.js");
		await loadJS("./components/WritingsComponent.js");
        
		callback();



    } catch (err) {
        console.error("JS load error:", err);
    }
}

init(applyVue);
</script>

</body>
</html>





<template>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css">
<script src="https://cdn.jsdelivr.net/npm/toastr@2.1.4/toastr.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastr@2.1.4/build/toastr.min.css">
<script src="https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-watch/1.21.0/jquery-watch.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>

<i class="fas fa-layer-group"></i> 
<script>
//toastr ==================================================
toastr.options = {
	"closeButton": true,
	"newestOnTop": false,
	"positionClass": "toast-bottom-center",
	"timeOut": "1000",
	"extendedTimeOut": "1000"
};
toastr.info("Portfolio is loaded").css({
		"border": "white 1px solid"
});		



//SweetAlert2 =============================================
//1.경고아이콘 + 닫힘버튼 ------------------------------------
Swal.fire({
	icon: 'warning',
	text: '권한이 없습니다',
	showCloseButton: true
});


//2.예 아니오 버튼 -----------------------------------------
Swal.fire({
	icon: 'question',
	text: '진행하시겠습니까?',
	showCancelButton: true,
	confirmButtonText: '예',
	cancelButtonText: '아니오'
}).then((result) => {
	if (result.isConfirmed) {
		console.log('예를 눌렀습니다');
	} else if (result.dismiss === Swal.DismissReason.cancel) {
		console.log('아니오를 눌렀습니다');
	}
});



//3.1초후 자동단힘 -----------------------------------------
Swal.fire({
	icon: 'warning',
	text: '권한이 없습니다',
	timer: 1000,
	showConfirmButton: false
});




//4.1초후 자동닫힘후 페이지 이동 -----------------------------
Swal.fire({
	icon: 'warning',
	text: '권한이 없습니다',
	timer: 1000,
	showConfirmButton: false
}).then(() => {
	location.href = '/';
});


//※ 초간단 코드 --------------------------------------
Swal.fire('메시지');// 단순 알림
Swal.fire({ icon:'success', text:'완료' });
Swal.fire({ icon:'warning', text:'경고' });
Swal.fire({ icon:'error', text:'실패' });
</script>
</template>
