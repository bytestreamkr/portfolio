<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<script src="https://code.jquery.com/jquery-1.11.3.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-watch/1.21.0/jquery-watch.js"></script>
<script src="https://kit.fontawesome.com/68bb695166.js"></script> 
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css">
<script src="https://cdn.jsdelivr.net/npm/toastr@2.1.4/toastr.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastr@2.1.4/build/toastr.min.css">
<script src="https://cdn.jsdelivr.net/npm/axios@1.18.1/dist/axios.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script><!-- # Vue.js v2.7.16 -->
<style>
.card{
	min-height:360px;
	margin-bottom:30px;
	box-shadow: 0 3px 6px rgba(0,0,0,0.16);
}
.card img{
	min-height:180px;
	max-height:200px;
}
.div-book-img{
	padding-bottom:10px;
}

.div-section:nth-child(n+2){
	margin-top:100px !important;
}

.span_link{
	cursor:pointer;
	color:#3590bb;
}
.span_link:hover{
	text-decoration:underline;
}

.span_link2{
	cursor:pointer;
}

.span_link3{
	cursor:pointer;
	color:#3590bb;
}
.span_link3:hover{
	text-decoration:underline;
}
.section-detail{
	font-size:1em;
}
</style>
</head>
<body>
<div id="app" class="container">

<div class="row mt-5 div-section">
	<div class="col-5 col-md-2 font-italic">
		<h4><i class="fas fa-layer-group mr-2"></i> {{sections[0].title}}</h4>
	</div>
	<div class="col-7 col-md-10 font-italic section-detail">
		{{sections[0].detail}}
	</div>
	<div class="col col-md-12 py-2" ref-class="bg-light">
		PHP, JavaScript, jQuery <br/>
		Kim du hwan (flashmotion@naver.com)
	</div>
</div>

<hr/>

<div class="row mt-5 div-section">
	<div class="col-5 col-md-2 font-italic">
		<h4><i class="fas fa-layer-group mr-2"></i> {{sections[1].title}}</h4>
	</div>
	<div class="col-7 col-md-10 font-italic section-detail">
		{{sections[1].detail}}
	</div>
</div>



<div class="row mt-4">

	<div class="col-12 col-md-3 col-sm-6 mb-3 px-2" v-for="(site, idx) in sites" :key="site.id">
		<div class="card" style="width:100%;">
			<img :src="`${site.img}`" class="card-img-top" alt="...">
			<div class="card-body">
			<h5 class="card-title">
				<!--<a :href="`${site.url}`" target="_blank">{{site.title}}</a>-->
				<span class="span_link" @click="open_link(`${site.url}`)">{{site.title}}</span>
			</h5>
			<p class="card-text">{{site.detail}}</p>
			<!--<a href="#" class="btn btn-default">Open Site</a>-->
			</div>
		</div>
	</div>

	
</div>


<hr/>


<div class="row mt-5 div-section">
	<div class="col-5 col-md-2 font-italic">
		<h4><i class="fas fa-layer-group mr-2"></i> {{sections[2].title}}</h4>
	</div>
	<div class="col-7 col-md-10 font-italic section-detail">
		{{sections[2].detail}}
	</div>
</div>

<div v-for="(book, idx) in writings" :key="book.id" class="row mt-4 mb-4 border rounded py-3">
	<div class="col-12 col-md-2 div-book-img">
	<!-- <a :href="`${book.url}`" target="_blank"><img :src="`${book.img}`"></a> -->
	<span class="span_link2" @click="open_link(`${book.url}`)"><img :src="`${book.img}`"></span>
	</div>
	<div class="col-12 col-md-10">
	<h5>
	<!-- <a :href="`${book.url}`" target="_blank">{{book.title}} [ {{book.pub_date}} 출간 ]</a> -->
	<span class="span_link3" @click="open_link(`${book.url}`)">{{book.title}} [ {{book.pub_date}} 출간 ]</span>
	</h5>
	<p>{{book.detail}}</p>
	</div>
</div>



</div>
<script src="./writings.data.js"></script>
<script src="./sites.data.v2.js"></script>
<script src="./sections.data.js"></script>
<script>
new Vue({
	el:"#app",
	data:{
		writings: writingsData,
		sites: sitesData,
		sections: sectionsData,
	},
	methods:{
		open_link(url){
			var winName = Array.from({ length: 10 }, () => String.fromCharCode(65 + Math.floor(Math.random() * 26))).join('');

			
			window.open(url, winName, "");
		},
		
	}
});



</script>
</body>
</html>

SweetAlert2 =============================================
1.경고아이콘 + 닫힘버튼 ------------------------------------
Swal.fire({
	icon: 'warning',
	text: '권한이 없습니다',
	showCloseButton: true
});


2.예 아니오 버튼 -----------------------------------------
Swal.fire({
	icon: 'question',
	text: '진행하시겠습니까?',
	showCancelButton: true,
	confirmButtonText: '예',
	cancelButtonText: '아니오'
}).then((result) => {
	if (result.isConfirmed) {
		console.log('예를 눌렀습니다');
	} else if (result.dismiss === Swal.DismissReason.cancel) {
		console.log('아니오를 눌렀습니다');
	}
});



3.1초후 자동단힘 -----------------------------------------
Swal.fire({
	icon: 'warning',
	text: '권한이 없습니다',
	timer: 1000,
	showConfirmButton: false
});




4.1초후 자동닫힘후 페이지 이동 -----------------------------
Swal.fire({
	icon: 'warning',
	text: '권한이 없습니다',
	timer: 1000,
	showConfirmButton: false
}).then(() => {
	location.href = '/';
});
